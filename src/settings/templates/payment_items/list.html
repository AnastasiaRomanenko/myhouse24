{% extends 'admin_panel/base.html' %}
{% load static %}

{% block title %}Pozycje płatności{% endblock %}

{% block content %}
<div class="row">
    <div class="col-xs-12">
        <div class="pull-right margin-bottom">
            <a class="btn btn-success" href="{% url 'settings:payment_items_create' %}">Dodaj pozycję</a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-xs-12">
        <div class="box">
            <div class="box-header with-border">
                <h3 class="box-title"></h3>
                <div class="box-tools">
                    <button type="button" id="clear-filters" class="btn btn-default btn-sm">
                        <span class="hidden-xs">Wyczyść</span>
                        <i class="fa fa-eraser visible-xs" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div id="w0" class="grid-view">
                <div class="box-body table-responsive no-padding">
                    <table id="payment-items-table" class="table table-bordered table-hover table-striped linkedRow" width="100%">
                        <thead>
                            <tr>
                                <th>Nazwa</th>
                                <th>Przychód/Wydatek</th>
                                <th style="width: 85px; min-width: 85px">&nbsp;</th>
                            </tr>
                            <tr class="filters">
                                <th>
                                    <input type="text" class="form-control form-control-sm dt-filter" data-name="name">
                                </th>
                                <th>
                                    <select class="form-control form-control-sm dt-filter" data-name="type">
                                        <option value=""></option>
                                        <option value="income">Przychód</option>
                                        <option value="expense">Zużycie</option>
                                    </select>
                                </th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div class="box-footer clearfix"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function () {
    $('[data-toggle="tooltip"]').tooltip();

    var table = $('#payment-items-table').DataTable({
        processing: true,
        serverSide: true,
        searching: false,
        lengthChange: true,
        pageLength: 25,
        orderCellsTop: true,
        autoWidth: false,
        ajax: {
            url: "{% url 'settings:payment_items_ajax_list' %}",
            type: "GET",
            data: function (d) {
                d.name = $('[data-name="name"]').val();
                d.type = $('[data-name="type"]').val();
            }
        },
        order: [[0, 'asc']],
        columns: [
            {data: 'name', name: 'name'},
            {data: 'type', name: 'type'},
            {data: 'actions', name: 'actions', orderable: false, searchable: false}
        ],
        createdRow: function (row, data) {
            if (data.row_href) {
                $(row).attr('data-href', data.row_href);
                $(row).attr('data-key', data.id);
                $(row).css('cursor', 'pointer');
            }
        },
        drawCallback: function () {
            $('[data-toggle="tooltip"]').tooltip();
        },
        language: {
            processing: "Ładowanie...",
            lengthMenu: "Pokaż _MENU_ wpisów",
            zeroRecords: "Brak wyników",
            info: "Wyświetlono _START_–_END_ z _TOTAL_ wpisów",
            infoEmpty: "Brak wpisów",
            infoFiltered: "(odfiltrowano z _MAX_ wpisów)",
            paginate: {
                first: "Pierwsza",
                last: "Ostatnia",
                next: "»",
                previous: "«"
            }
        }
    });

    var reloadTable = function () {
        table.ajax.reload(null, true);
    };

    var debounceTimer = null;
    $(document).on('input', '.dt-filter[type="text"]', function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function () {
            reloadTable();
        }, 400);
    });

    $(document).on('change', 'select.dt-filter', function () {
        reloadTable();
    });

    $('#clear-filters').on('click', function () {
        $('.dt-filter').each(function () {
            $(this).val('');
        });
        reloadTable();
    });

    $(document).on('click', '#payment-items-table tbody tr[data-href]', function (e) {
        if ($(e.target).closest('a, button, form').length) return;
        window.location.href = $(this).data('href');
    });
});
</script>
{% endblock %}
