{% extends 'admin_panel/base.html' %}
{% load static %}

{% block content %}
<div class="box">
    <div class="box-body">
        <form id="w0" action="{% url 'settings:payment_details' %}" method="post">
            {% csrf_token %}

            <div class="row">
                <div class="col-xs-12 col-lg-7">
                    <div class="row margin-bottom-15">
                        <div class="col-xs-12">
                            <div class="form-group">
                                <label>Nazwa firmy</label>
                                {{ form.company_name }}
                            </div>

                            <div class="form-group">
                                <label>Informacje</label>
                                {{ form.information }}
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-xs-12 text-center">
                    <div class="form-group">
                        <a href="{% url 'settings:payment_details' %}" class="btn btn-default">Anuluj</a>
                        <button type="submit" class="btn btn-success">Zapisz</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
