{% extends 'admin_panel/base.html' %}
{% load static %}

{% block content %}
<div class="row">
    <div class="col-xs-12">
        <div class="pull-right margin-bottom">
            <a class="btn btn-success" href="{% url 'buildings:house_create' %}">Dodaj budynek</a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-xs-12">
        <div class="box">
            <div class="box-header with-border">
                <h3 class="box-title"></h3>
                <div class="box-tools">
                    <button id="clear-filters" type="button" class="btn btn-default btn-sm">
                        <span class="hidden-xs">Wyczyść</span><i class="fa fa-eraser visible-xs" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div id="w0" class="grid-view">
                <div class="box-body table-responsive no-padding">
                    <table id="houses-table" class="table table-bordered table-hover table-striped linkedRow">
                        <thead>
                            <tr>
                                <th style="width: 40px; min-width: 40px">#</th>
                                <th>Nazwa</th>
                                <th>Adres</th>
                                <th style="width: 80px; min-width: 80px">&nbsp;</th>
                            </tr>
                            <tr id="w0-filters" class="filters">
                                <th></th>
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="title"></th>
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="address"></th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function () {
    $('[data-toggle="tooltip"]').tooltip();

    var table = $('#houses-table').DataTable({
        processing: true,
        serverSide: true,
        searching: false,
        lengthChange: true,
        pageLength: 25,
        orderCellsTop: true,
        autoWidth: false,
        ajax: {
            url: "{% url 'buildings:house_ajax_list' %}",
            type: "GET",
            data: function (d) {
                d.title = $('[data-name="title"]').val();
                d.address = $('[data-name="address"]').val();
            }
        },
        order: [[0, 'asc']],
        columns: [
            {data: 'pk', name: 'pk'},
            {data: 'title', name: 'title'},
            {data: 'address', name: 'address'},
            {data: 'actions', name: 'actions', orderable: false, searchable: false}
        ],
        createdRow: function (row, data) {
            if (data.row_href) {
                $(row).attr('data-href', data.row_href);
                $(row).attr('data-key', data.id);
                $(row).css('cursor', 'pointer');
            }
        },
        drawCallback: function () {
            $('[data-toggle="tooltip"]').tooltip();
        },
        language: {
            processing: "Ładowanie...",
            lengthMenu: "Pokaż _MENU_ rekordów",
            zeroRecords: "Nic nie znaleziono",
            info: "Pokazano od _START_ do _END_ z _TOTAL_ rekordów",
            infoEmpty: "Brak rekordów",
            infoFiltered: "(przefiltrowano z _MAX_ rekordów)",
            paginate: {
                first: "Pierwsza",
                last: "Ostatnia",
                next: "»",
                previous: "«"
            }
        }
    });

    var debounceTimer = null;
    $(document).on('input', '.dt-filter[type="text"]', function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function () {
            table.ajax.reload(null, true);
        }, 400);
    });

    $('#clear-filters').on('click', function () {
        $('.dt-filter').val('');
        table.ajax.reload(null, true);
    });

    $(document).on('click', '#houses-table tbody tr[data-href]', function (e) {
        if ($(e.target).closest('a, button, form').length) return;
        window.location.href = $(this).data('href');
    });
});
</script>
{% endblock %}
