{% extends 'admin_panel/base.html' %}
{% load static %}

{% block content %}
<div class="box">
    <div class="box-header with-border">
        <h3 class="box-title">Wyślij zaproszenie</h3>
    </div>
    <div class="box-body">
        <form id="w0" method="post">
            {% csrf_token %}
            <input type="hidden" name="_csrf-backend">
            <div class="row">
                <div class="col-xs-12 col-sm-6">
                    <div class="form-group field-email">
                        <label class="control-label">Email</label>
                        <input type="text" class="form-control" name="email" value="{{ form.email }}" placeholder="info@example.com">
                        <div class="help-block text-danger">{{ form.email.errors }}</div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-xs-12 col-sm-6">
                    <div class="form-group">
                        <button type="submit" class="btn btn-success">Wyślij zaproszenie</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock %}
