{% extends "admin_panel/base.html" %}
{% load static %}

{% block content %}

<div class="row">
    <div class="col-xs-12">
        <div class="btn-group pull-right margin-bottom">
            <button type="button" class="btn btn-success dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                Wybierz akcję
                <span class="caret"></span>
            </button>
            <ul class="dropdown-menu">
                <li>
                    <a href="{% url 'users:owner_create' %}">Dodaj właściciela mieszkania</a>
                </li>
                <li>
                    <a href="#">Wyślij wiadomość do dłużników</a>
                </li>
                <li>
                    <a href="{% url 'users:owner_invite' %}">Wyślij zaproszenie</a>
                </li>
            </ul>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-xs-12">
        <div class="box">
            <div class="box-header with-border">
                <h3 class="box-title"></h3>
                <div class="box-tools">
                    <a href="{% url 'users:owner_list' %}" id="clear-filters" class="btn btn-default btn-sm">
                        <span class="hidden-xs">Wyczyść</span><i class="fa fa-eraser visible-xs" aria-hidden="true"></i>
                    </a>
                </div>
            </div>

            <div id="w0" class="grid-view">
                <div class="box-body table-responsive no-padding">
                    <table id="owner-table" class="table table-bordered table-hover table-striped linkedRow">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th><a href="?sort=full_name">Imię i nazwisko</a></th>
                                <th>Telefon</th>
                                <th>Email</th>
                                <th>Budynek</th>
                                <th>Mieszkanie</th>
                                <th><a href="?sort=date_joined">Dodano</a></th>
                                <th>Status</th>
                                <th>Dług</th>
                                <th style="width: 129px; min-width: 129px">&nbsp;</th>
                            </tr>
                            <tr id="w0-filters" class="filters">
                                <form method="GET">
                                    <th>
                                        <input type="text" class="form-control form-control-sm dt-filter" data-name="external_id">
                                    </th>
                                    <th>
                                        <input type="text" class="form-control form-control-sm dt-filter" data-name="full_name">
                                    </th>
                                    <th>
                                        <input type="text" class="form-control form-control-sm dt-filter" data-name="phone_number">
                                    </th>
                                    <th>
                                        <input type="text" class="form-control form-control-sm dt-filter" data-name="email">
                                    </th>
                                    <th>
                                        <select id="owner-house-filter" class="form-control form-control-sm dt-filter" data-name="house">
                                            <option value=""></option>
                                        </select>
                                    </th>
                                    <th>
                                        <input type="text" class="form-control form-control-sm dt-filter" data-name="flat">
                                    </th>
                                    <th>
                                        <input type="text" class="form-control form-control-sm dt-filter" data-name="date_joined">
                                    </th>
                                    <th>
                                        <select class="form-control form-control-sm dt-filter" data-name="status">
                                            <option value=""></option>
                                            <option value="active">Aktywny</option>
                                            <option value="new">Nowy</option>
                                            <option value="inactive">Nieaktywny</option>
                                        </select>
                                    </th>
                                    <th>
                                        <input type="text" class="form-control form-control-sm dt-filter" data-name="dept">
                                    </th>
                                    <th></th>
                                </form>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    $(function () {
        $('[data-toggle="tooltip"]').tooltip();

        var table = $('#owner-table').DataTable({
            processing: true,
            serverSide: true,
            searching: false,
            lengthChange: true,
            pageLength: 25,
            orderCellsTop: true,
            autoWidth: false,
            ajax: {
                url: "{% url 'users:owner_ajax_list' %}",
                type: "GET",
                data: function (d) {
                    d.external_id = $('[data-name="external_id"]').val();
                    d.full_name = $('[data-name="full_name"]').val();
                    d.phone_number = $('[data-name="phone_number"]').val();
                    d.email = $('[data-name="email"]').val();
                    d.house = $('[data-name="house"]').val();
                    d.flat = $('[data-name="flat"]').val();
                    d.date_joined = $('[data-name="date_joined"]').val();
                    d.status = $('[data-name="status"]').val();
                    d.dept = $('[data-name="dept"]').val();
                    d.actions = $('[data-name="actions"]').val();
                }
            },
            order: [[0, 'asc']],
            columns: [
                {data: 'external_id', name: 'external_id'},
                {data: 'full_name', name: 'full_name'},
                {data: 'phone_number', name: 'phone_number'},
                {data: 'email', name: 'email'},
                {data: 'house', name: 'house'},
                {data: 'flat', name: 'flat'},
                {data: 'date_joined', name: 'date_joined'},
                {data: 'status', name: 'status'},
                {data: 'dept', name: 'dept'},
                {data: 'actions', name: 'actions'},
            ],
            createdRow: function (row, data) {
                if (data.row_href) {
                    $(row).attr('data-href', data.row_href);
                    $(row).attr('data-key', data.id);
                    $(row).css('cursor', 'pointer');
                }
            },
            drawCallback: function () {
                $('[data-toggle="tooltip"]').tooltip();
            },
            language: {
                processing: "Ładowanie...",
                lengthMenu: "Pokaż _MENU_ wpisów",
                zeroRecords: "Brak wyników",
                info: "Wyświetlono _START_–_END_ z _TOTAL_ wpisów",
                infoEmpty: "Brak wpisów",
                infoFiltered: "(odfiltrowano z _MAX_ wpisów)",
                paginate: {
                    first: "Pierwsza",
                    last: "Ostatnia",
                    next: "»",
                    previous: "«"
                }
            }
        });

        var reloadTable = function () {
            table.ajax.reload(null, true);
        };

        $('#owner-house-filter').select2({
            width: '100%',
            allowClear: true,
            placeholder: '',
            language: 'ru',
            ajax: {
                url: "{% url 'buildings:house_select2' %}",
                dataType: 'json',
                delay: 250,
                data: function (params) {
                    return {
                        term: params.term || '',
                        page: params.page || 1
                    };
                },
                processResults: function (data) {
                    return data;
                },
                cache: true
            }
        });

        var debounceTimer = null;
        $(document).on('input', '.dt-filter[type="text"]', function () {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function () {
                reloadTable();
            }, 400);
        });

        $(document).on('change', 'select.dt-filter', function () {
            reloadTable();
        });

        $('#clear-filters').on('click', function (e) {
            e.preventDefault();
            $('.dt-filter').each(function () {
                $(this).val('');
                if ($(this).is('select')) {
                    $(this).trigger('change.select2');
                }
            });
            reloadTable();
        });

        $(document).on('click', '#owner-table tbody tr[data-href]', function (e) {
            if ($(e.target).closest('a, button, form').length) return;
            window.location.href = $(this).data('href');
        });
    });
</script>
{% endblock %}
