{% extends 'admin_panel/base.html' %}
{% load static %}


{% block content %}
<div class="row">
    <div class="col-xs-12">
        <div class="pull-right margin-bottom">
            <a class="btn btn-success" href="{% url 'users:admin_create' %}">Utwórz użytkownika</a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-xs-12">
        <div class="box">
            <div class="box-header with-border">
                <h3 class="box-title"></h3>
                <div class="box-tools">
                    <button type="button" id="clear-filters" class="btn btn-default btn-sm">
                        <span class="hidden-xs">Wyczyść</span>
                        <i class="fa fa-eraser visible-xs" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div class="box-body table-responsive no-padding">
                <table id="admins-table" class="table table-bordered table-hover table-striped" width="100%">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Użytkownik</th>
                            <th>Rola</th>
                            <th>Telefon</th>
                            <th>E-mail (login)</th>
                            <th>Status</th>
                            <th style="width: 114px; min-width: 114px">&nbsp;</th>
                        </tr>
                        <tr class="filters">
                            <th></th>
                            <th>
                                <input type="text" class="form-control form-control-sm dt-filter" data-name="full_name">
                            </th>
                            <th>
                                <select class="form-control form-control-sm dt-filter" data-name="role">
                                    <option value=""></option>
                                    <option value="Dyrektor">Dyrektor</option>
                                    <option value="Zarządca">Zarządca</option>
                                    <option value="Księgowy">Księgowy</option>
                                    <option value="Elektryk">Elektryk</option>
                                    <option value="Hydraulik">Hydraulik</option>
                                </select>
                            </th>
                            <th>
                                <input type="text" class="form-control form-control-sm dt-filter" data-name="phone_number">
                            </th>
                            <th>
                                <input type="text" class="form-control form-control-sm dt-filter" data-name="email">
                            </th>
                            <th>
                                <select class="form-control form-control-sm dt-filter" data-name="status">
                                    <option value=""></option>
                                    <option value="active">Aktywny</option>
                                    <option value="new">Nowy</option>
                                    <option value="inactive">Nieaktywny</option>
                                </select>
                            </th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="box-footer clearfix"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(function () {
        $('[data-toggle="tooltip"]').tooltip();

        var table = $('#admins-table').DataTable({
            processing: true,
            serverSide: true,
            searching: false,
            lengthChange: true,
            pageLength: 25,
            orderCellsTop: false,
            autoWidth: false,
            ajax: {
                url: "{% url 'users:admin_ajax_list' %}",
                type: "GET",
                data: function (d) {
                    d.id = $('[data-name="id"]').val();
                    d.full_name = $('[data-name="full_name"]').val();
                    d.role = $('[data-name="role"]').val();
                    d.phone_number = $('[data-name="phone_number"]').val();
                    d.email = $('[data-name="email"]').val();
                    d.status = $('[data-name="status"]').val();
                    d.actions = $('[data-name="actions"]').val();
                }
            },
            order: [[0, 'asc']],
            columns: [
                {data: 'pk', name: 'pk'},
                {data: 'full_name', name: 'full_name'},
                {data: 'role', name: 'role'},
                {data: 'phone_number', name: 'phone_number'},
                {data: 'email', name: 'email'},
                {data: 'status', name: 'status'},
                {data: 'actions', name: 'actions'},
            ],
            createdRow: function (row, data) {
                if (data.row_href) {
                    $(row).attr('data-href', data.row_href);
                    $(row).attr('data-key', data.id);
                    $(row).css('cursor', 'pointer');
                }
            },
            drawCallback: function () {
                $('[data-toggle="tooltip"]').tooltip();
            },
            language: {
                processing: "Ładowanie...",
                lengthMenu: "Pokaż _MENU_ wpisów",
                zeroRecords: "Brak wyników",
                info: "Wyświetlono _START_–_END_ z _TOTAL_ wpisów",
                infoEmpty: "Brak wpisów",
                infoFiltered: "(odfiltrowano z _MAX_ wpisów)",
                paginate: {
                    first: "Pierwsza",
                    last: "Ostatnia",
                    next: "»",
                    previous: "«"
                }
            }
        });

        var reloadTable = function () {
            table.ajax.reload(null, true);
        };

        var debounceTimer = null;
        $(document).on('input', '.dt-filter[type="text"]', function () {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function () {
                reloadTable();
            }, 400);
        });

        $(document).on('change', 'select.dt-filter', function () {
            reloadTable();
        });

        $('#clear-filters').on('click', function () {
            $('.dt-filter').each(function () {
                $(this).val('');
            });
            reloadTable();
        });

        $(document).on('click', '#admins-table tbody tr[data-href]', function (e) {
            if ($(e.target).closest('a, button, form').length) return;
            window.location.href = $(this).data('href');
        });
    });
</script>
{% endblock %}
