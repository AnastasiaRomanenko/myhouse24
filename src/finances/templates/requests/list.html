{% extends 'admin_panel/base.html' %}
{% load static %}

{% block content %}
<div class="row">
    <div class="col-xs-12">
        <div class="pull-right margin-bottom">
            <a class="btn btn-success" href="{% url 'finances:requests_create' %}">Dodaj zgłoszenie</a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-xs-12">
        <div class="box">
            <div class="box-header with-border">
                <h3 class="box-title"></h3>
                <div class="box-tools">
                    <button type="button" id="clear-filters" class="btn btn-default btn-sm">
                        <span class="hidden-xs">Wyczyść</span><i class="fa fa-eraser visible-xs" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div id="w0" class="grid-view">
                <div class="box-body table-responsive no-padding">
                    <table id="requests-table" class="table table-bordered table-hover table-striped linkedRow" width="100%">
                        <thead>
                            <tr>
                                <th style="width: 100px; min-width: 100px">Nr zgłoszenia</th>
                                <th style="width: 135px; min-width: 135px">Preferowany czas</th>
                                <th style="min-width: 350px">Opis</th>
                                <th>Mieszkanie</th>
                                <th style="min-width: 200px">Właściciel</th>
                                <th>Telefon</th>
                                <th style="min-width: 125px">Specjalista</th>
                                <th style="width: 135px; min-width: 135px">Status</th>
                                <th style="width: 80px; min-width: 80px">&nbsp;</th>
                            </tr>
                            <tr class="filters">
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="request_id"></th>
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="date_time" placeholder="dd.mm.rrrr"></th>
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="description"></th>
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="flat"></th>
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="owner"></th>
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="phone"></th>
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="worker"></th>
                                <th>
                                    <select class="form-control form-control-sm dt-filter" data-name="status">
                                        <option value=""></option>
                                        <option value="new">Nowe</option>
                                        <option value="in_progress">W trakcie</option>
                                        <option value="done">Zakończono</option>
                                    </select>
                                </th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div class="box-footer clearfix"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function () {
    $('[data-toggle="tooltip"]').tooltip();

    var table = $('#requests-table').DataTable({
        processing: true,
        serverSide: true,
        searching: false,
        lengthChange: true,
        pageLength: 25,
        orderCellsTop: true,
        autoWidth: false,
        ajax: {
            url: "{% url 'finances:requests_ajax_list' %}",
            type: "GET",
            data: function (d) {
                d.request_id = $('[data-name="request_id"]').val();
                d.date_time = $('[data-name="date_time"]').val();
                d.description = $('[data-name="description"]').val();
                d.flat = $('[data-name="flat"]').val();
                d.owner = $('[data-name="owner"]').val();
                d.phone = $('[data-name="phone"]').val();
                d.worker = $('[data-name="worker"]').val();
                d.status = $('[data-name="status"]').val();
            }
        },
        order: [[0, 'desc']],
        columns: [
            {data: 'pk', name: 'pk'},
            {data: 'date_time', name: 'date_time'},
            {data: 'description', name: 'description'},
            {data: 'flat', name: 'flat'},
            {data: 'owner', name: 'owner'},
            {data: 'phone', name: 'phone', orderable: false, searchable: false},
            {data: 'worker', name: 'worker'},
            {data: 'status', name: 'status'},
            {data: 'actions', name: 'actions', orderable: false, searchable: false}
        ],
        createdRow: function (row, data) {
            if (data.row_href) {
                $(row).attr('data-href', data.row_href);
                $(row).attr('data-key', data.id);
                $(row).css('cursor', 'pointer');
            }
        },
        drawCallback: function () {
            $('[data-toggle="tooltip"]').tooltip();
        },
        language: {
            processing: "Ładowanie...",
            lengthMenu: "Pokaż _MENU_ wpisów",
            zeroRecords: "Brak wyników",
            info: "Wyświetlono _START_–_END_ z _TOTAL_ wpisów",
            infoEmpty: "Brak wpisów",
            infoFiltered: "(odfiltrowano z _MAX_ wpisów)",
            paginate: {
                first: "Pierwsza",
                last: "Ostatnia",
                next: "»",
                previous: "«"
            }
        }
    });

    var reloadTable = function () {
        table.ajax.reload(null, true);
    };

    var debounceTimer = null;
    $(document).on('input', '.dt-filter[type="text"]', function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(reloadTable, 400);
    });

    $(document).on('change', 'select.dt-filter', reloadTable);

    $('#clear-filters').on('click', function () {
        $('.dt-filter').val('');
        reloadTable();
    });

    $(document).on('click', '#requests-table tbody tr[data-href]', function (e) {
        if ($(e.target).closest('a, button, form').length) return;
        window.location.href = $(this).data('href');
    });
});
</script>
{% endblock %}
