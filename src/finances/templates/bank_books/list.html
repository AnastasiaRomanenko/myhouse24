{% extends 'admin_panel/base.html' %}
{% load static %}

{% block content %}
<div class="row">
    <div class="col-xs-12">
        <div class="btn-group pull-right margin-bottom">
            <button type="button" class="btn btn-success dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                Wybierz akcję <span class="caret"></span>
            </button>
            <ul class="dropdown-menu">
                <li><a href="{% url 'finances:bank_books_create' %}">Dodaj konto osobiste</a></li>
                <li><a href="{% url 'finances:bank_books_export' %}">Eksportuj do Excel</a></li>
            </ul>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-xs-12">
        <div class="box">
            <div class="box-header with-border">
                <h3 class="box-title"></h3>
                <div class="box-tools">
                    <button id="clear-filters" type="button" class="btn btn-default btn-sm">
                        <span class="hidden-xs">Wyczyść</span><i class="fa fa-eraser visible-xs" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div id="w0" class="grid-view">
                <div class="box-body table-responsive no-padding">
                    <table id="bank-books-table" class="table table-bordered table-hover table-striped linkedRow" width="100%">
                        <thead>
                            <tr>
                                <th style="width: 125px; min-width: 125px">№</th>
                                <th>Status</th>
                                <th style="width: 100px; min-width: 100px">Mieszkanie</th>
                                <th style="min-width: 200px">Budynek</th>
                                <th style="width: 160px; min-width: 65px">Sekcja</th>
                                <th style="min-width: 200px">Właściciel</th>
                                <th style="width: 120px; min-width: 120px">Saldo (zł)</th>
                                <th style="width: 80px; min-width: 80px">&nbsp;</th>
                            </tr>
                            <tr id="w0-filters" class="filters">
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="uid"></th>
                                <th>
                                    <select class="form-control form-control-sm dt-filter" data-name="status">
                                        <option value=""></option>
                                        <option value="active">Aktywny</option>
                                        <option value="inactive">Nieaktywny</option>
                                    </select>
                                </th>
                                <th><input type="text" class="form-control form-control-sm dt-filter" data-name="flat"></th>
                                <th>
                                    <select id="bb-house-filter" class="form-control form-control-sm dt-filter" data-name="house">
                                        <option value=""></option>
                                    </select>
                                </th>
                                <th>
                                    <select id="bb-section-filter" class="form-control form-control-sm dt-filter" data-name="section">
                                        <option value="">Wybierz budynek</option>
                                    </select>
                                </th>
                                <th>
                                    <select id="bb-owner-filter" class="form-control form-control-sm dt-filter" data-name="owner">
                                        <option value=""></option>
                                    </select>
                                </th>
                                <th>
                                    <select class="form-control form-control-sm dt-filter" data-name="has_debt">
                                        <option value=""></option>
                                        <option value="1">Jest dług</option>
                                        <option value="0">Brak długu</option>
                                    </select>
                                </th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="box-footer clearfix"></div>
            </div>

            <div class="box-footer">
                <div>Liczba kont: <span class="text-bold">{{ accounts_count|default:"0" }}</span></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function () {
    $('[data-toggle="tooltip"]').tooltip();

    function initSelect2($element, url, placeholder) {
        $element.select2({
            width: '100%',
            allowClear: true,
            placeholder: placeholder,
            language: 'pl',
            ajax: {
                url: url,
                dataType: 'json',
                delay: 250,
                data: function (params) {
                    return {term: params.term || '', page: params.page || 1};
                },
                processResults: function (data) {
                    return data;
                },
                cache: true
            }
        });
    }

    function fillSimpleSelect($select, items, emptyText) {
        $select.empty().append($('<option>', {value: '', text: emptyText}));
        $.each(items, function (_, item) {
            $select.append($('<option>', {value: item.id, text: item.text}));
        });
        $select.val('').trigger('change.select2');
    }

    function loadHouseChildren(houseId) {
        if (!houseId) {
            fillSimpleSelect($('#bb-section-filter'), [], 'Wybierz budynek');
            return;
        }
        $.getJSON("{% url 'buildings:house_children' %}", {house_id: houseId}, function (data) {
            fillSimpleSelect($('#bb-section-filter'), data.sections, 'Wybierz...');
        });
    }

    initSelect2($('#bb-house-filter'), "{% url 'buildings:house_select2' %}", '');
    initSelect2($('#bb-owner-filter'), "{% url 'users:owner_select2' %}", '');

    var table = $('#bank-books-table').DataTable({
        processing: true,
        serverSide: true,
        searching: false,
        lengthChange: true,
        pageLength: 25,
        orderCellsTop: true,
        autoWidth: false,
        ajax: {
            url: "{% url 'finances:bank_books_ajax_list' %}",
            type: "GET",
            data: function (d) {
                d.uid = $('[data-name="uid"]').val();
                d.status = $('[data-name="status"]').val();
                d.flat = $('[data-name="flat"]').val();
                d.house = $('[data-name="house"]').val();
                d.section = $('[data-name="section"]').val();
                d.owner = $('[data-name="owner"]').val();
                d.has_debt = $('[data-name="has_debt"]').val();
            }
        },
        order: [[0, 'desc']],
        columns: [
            {data: 'random_number', name: 'random_number'},
            {data: 'status', name: 'status', orderable: false, searchable: false},
            {data: 'flat', name: 'flat', orderable: false, searchable: false},
            {data: 'house', name: 'house', orderable: false, searchable: false},
            {data: 'section', name: 'section', orderable: false, searchable: false},
            {data: 'owner', name: 'owner', orderable: false, searchable: false},
            {data: 'balance', name: 'balance', orderable: false, searchable: false},
            {data: 'actions', name: 'actions', orderable: false, searchable: false}
        ],
        createdRow: function (row, data) {
            if (data.row_href) {
                $(row).attr('data-href', data.row_href);
                $(row).css('cursor', 'pointer');
            }
        },
        drawCallback: function () {
            $('[data-toggle="tooltip"]').tooltip();
        },
        language: {
            processing: "Ładowanie...",
            lengthMenu: "Pokaż _MENU_ rekordów",
            zeroRecords: "Nic nie znaleziono",
            info: "Pokazano od _START_ do _END_ z _TOTAL_ rekordów",
            infoEmpty: "Brak rekordów",
            infoFiltered: "(przefiltrowano z _MAX_ rekordów)",
            paginate: {first: "Pierwsza", last: "Ostatnia", next: "»", previous: "«"}
        }
    });

    var reloadTable = function () {
        table.ajax.reload(null, true);
    };

    var debounceTimer = null;
    $(document).on('input', '.dt-filter[type="text"]', function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(reloadTable, 400);
    });
    $(document).on('change', 'select.dt-filter', reloadTable);

    $('#bb-house-filter').on('change', function () {
        loadHouseChildren($(this).val());
    });

    $('#clear-filters').on('click', function () {
        $('.dt-filter').each(function () {
            $(this).val('');
            if ($(this).is('select')) {
                $(this).trigger('change.select2');
            }
        });
        loadHouseChildren('');
        reloadTable();
    });

    $(document).on('click', '#bank-books-table tbody tr[data-href]', function (e) {
        if ($(e.target).closest('a, button, form, input, select, .select2-container').length) return;
        window.location.href = $(this).data('href');
    });
});
</script>
{% endblock %}
