{% extends 'crm/base.html' %}
{% load static %}

{% block page_title %}Edycja profilu{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="box">
            <div class="box-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.non_field_errors }}

                    {% for field in form %}
                        <div class="form-group mb-3">
                            <label class="control-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="help-block text-danger">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="text-end">
                        <a href="{% url 'crm:profile' %}" class="btn btn-default">Anuluj</a>
                        <button type="submit" class="btn btn-success">Zapisz</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
