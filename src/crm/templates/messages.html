{% extends 'crm/base.html' %}
{% load static %}

{% block content %}
<div class="box">
    <div class="box-header with-border">
        <h3 class="box-title"></h3>
        <div class="box-tools pull-right">
            <input type="text" id="message-search" class="form-control input-sm" placeholder="Szukaj">
        </div>
    </div>

    <div class="box-body">
        <div class="mailbox-controls mb-2">
            <button type="button" class="btn btn-default btn-sm" id="check-all" title="Zaznacz wszystkie">
                <i class="fa fa-square-o"></i>
            </button>
            <button type="button" class="btn btn-default btn-sm delete-many" title="Usuń zaznaczone">
                <i class="fa fa-trash-o"></i>
            </button>
        </div>

        <div class="table-responsive no-padding">
            <table id="messages-table" class="table table-hover table-striped" width="100%">
                <thead>
                    <tr>
                        <th style="width: 30px">&nbsp;</th>
                        <th style="min-width: 200px">Od kogo</th>
                        <th>Treść</th>
                        <th style="width: 60px">№</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function () {
    var table = $('#messages-table').DataTable({
        processing: true,
        serverSide: true,
        searching: false,
        lengthChange: true,
        pageLength: 10,
        autoWidth: false,
        ajax: {
            url: "{% url 'crm:message_ajax' %}",
            type: "GET",
            data: function (d) {
                d.search = $('#message-search').val();
            }
        },
        order: [[3, 'desc']],
        columns: [
            {data: 'selection', name: 'selection', orderable: false, searchable: false},
            {data: 'sender', name: 'sender', orderable: false, searchable: false},
            {data: 'text', name: 'text', orderable: false, searchable: false},
            {data: 'pk', name: 'pk'}
        ],
        createdRow: function (row, data) {
            if (data.row_href) {
                $(row).attr('data-href', data.row_href);
                $(row).css('cursor', 'pointer');
            }
        },
        language: {
            processing: "Ładowanie...",
            lengthMenu: "Pokaż _MENU_ wpisów",
            zeroRecords: "Brak wyników",
            info: "Wyświetlono _START_–_END_ z _TOTAL_ wpisów",
            infoEmpty: "Brak wpisów",
            infoFiltered: "(odfiltrowano z _MAX_ wpisów)",
            paginate: {first: "Pierwsza", last: "Ostatnia", next: "»", previous: "«"}
        }
    });

    var debounceTimer = null;
    $('#message-search').on('input', function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function () { table.ajax.reload(null, true); }, 400);
    });

    $('#check-all').on('click', function () {
        var $boxes = $('#messages-table input[name="selection[]"]');
        var allChecked = $boxes.length && $boxes.filter(':checked').length === $boxes.length;
        $boxes.prop('checked', !allChecked);
    });

    $(document).on('click', '#messages-table tbody tr[data-href]', function (e) {
        if ($(e.target).is('input')) return;
        window.location.href = $(this).data('href');
    });

    $('.delete-many').on('click', function () {
        var ids = [];
        $('#messages-table input[name="selection[]"]:checked').each(function () {
            ids.push($(this).val());
        });
        if (!ids.length) { alert('Nic nie wybrano'); return; }
        if (!confirm('Dane zostaną usunięte. Kontynuować?')) return;
        $.ajax({
            url: "{% url 'crm:message_delete_ajax' %}",
            type: 'post',
            data: {'ids[]': ids, 'csrfmiddlewaretoken': '{{ csrf_token }}'},
            success: function () { table.ajax.reload(null, false); }
        });
    });
});
</script>
{% endblock %}
